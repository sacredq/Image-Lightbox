<!DOCTYPE html>
<html>
    <head>
        <title>Image Lightbox</title>
        <link rel="stylesheet" href="style.css">
        <meta charset = "UTF-8">
        <meta name = "viewport" content = "width = device-width, initial-scale = 1.0">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
    </head>
    <body>
        <div class = "wrapper">
            <div class = "gallery">
                <div class = "image">
                    <img id = "img1" class = "mainImages" src = "images/img-1.jpg">
                </div>

                <div class = "image">
                    <img id = "img2" class = "mainImages" src = "images/img-2.jpg">
                </div>

                <div class = "image">
                    <img id = "img3" class = "mainImages" src = "images/img-3.jpg">
                </div>

                <div class = "image">
                    <img id = "img4" class = "mainImages" src = "images/img-4.jpg">
                </div>

                <div class = "image">
                    <img id = "img5" class = "mainImages" src = "images/img-5.jpg">
                </div>

                <div class = "image">
                    <img id = "img6" class = "mainImages" src = "images/img-6.jpg">
                </div>
            </div>
        </div>
        <div id = "info-box" class = "info-box">
            <div class = "top-info">
                <div class = "text-info">
                    <p>Image</p>
                    <p id = "image-number">1</p>
                    <p>of 6</p>
                </div>

                <div id = "closeBtn" class = "close">
                    <i id = "close" class = "fa-solid fa-xmark"></i>
                </div>
            </div>

            <div class = "main-image">
                <!-- back-image -->
                 <img id = "windowImage" src = "images/img-1.jpg">
                 <div class = "arrows">
                    <i id = "left-arrow" class="fa-solid fa-arrow-left"></i>
                    <i id = "right-arrow" class="fa-solid fa-arrow-right"></i>
                 </div>
            </div>
        </div>
        <script src = "main.js"></script>
    </body>
</html>
